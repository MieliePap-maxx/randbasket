name = "sa-grocery-price-checker-api"
main = "src/index.ts"
compatibility_date = "2026-07-15"

[vars]
APP_ORIGIN = "https://www.randbasket.co.za"

[[d1_databases]]
binding = "DB"
database_name = "grocery-price-checker"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "CATALOGUE"
bucket_name = "grocery-catalogue-production"
