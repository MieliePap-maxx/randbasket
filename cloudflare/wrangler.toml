# Deployed from GitHub by Cloudflare Workers Builds.
name = "randbasket-api"
main = "src/index.ts"
compatibility_date = "2026-07-15"

[triggers]
crons = ["17 2 * * *"]

[vars]
APP_ORIGIN = "https://www.randbasket.co.za"
FEEDBACK_FROM = "feedback@randbasket.co.za"
FEEDBACK_TO = "randbasketzar@gmail.com"

[ai]
binding = "AI"

[[send_email]]
name = "FEEDBACK_EMAIL"
destination_address = "randbasketzar@gmail.com"
allowed_sender_addresses = ["feedback@randbasket.co.za"]

[[routes]]
pattern = "api.randbasket.co.za"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "randbasket-catalogue"
database_id = "494cfdd0-f4e7-4217-92b1-53283c64e826"
